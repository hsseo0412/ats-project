services:
  # ----------------------------------------
  # Nginx (Web Server)
  # ----------------------------------------
  nginx:
    image: nginx:alpine
    container_name: app_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  # ----------------------------------------
  # PHP 8.4-FPM (Laravel App)
  # ----------------------------------------
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: app_php
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=local
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  # ----------------------------------------
  # MySQL 8.0
  # ----------------------------------------
  mysql:
    image: mysql:8.0
    container_name: app_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - app-network

  # ----------------------------------------
  # Redis (Cache / Session / Queue)
  # ----------------------------------------
  redis:
    image: redis:alpine
    container_name: app_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # ----------------------------------------
  # phpMyAdmin (DB GUI)
  # ----------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: app_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    depends_on:
      - mysql
    networks:
      - app-network

  # ----------------------------------------
  # Laravel Horizon (Queue Monitor)
  # ----------------------------------------
  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: app_horizon
    volumes:
      - .:/var/www/html
    command: php artisan horizon
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  # ----------------------------------------
  # 최초 1회 설치: composer install + migrate + seed
  # 실행: docker compose --profile setup up setup
  # ----------------------------------------
  setup:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: >
      sh -c "
        echo 'Waiting for MySQL...' &&
        sleep 10 &&
        composer install &&
        php artisan key:generate &&
        php artisan migrate --seed &&
        php artisan storage:link &&
        echo 'Setup complete!'
      "
    depends_on:
      - mysql
      - redis
    networks:
      - app-network
    profiles:
      - setup

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge
